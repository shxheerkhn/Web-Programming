<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HABIB BANK LIMITED Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #007f63, #00a88e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #073b4c;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      padding: 1.9rem 1.8rem 1.5rem;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      margin-bottom: 1.1rem;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .logo-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #007f63;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }
    h1 {
      font-size: 1.25rem;
      text-align: center;
      margin-bottom: 0.35rem;
    }
    p.subtitle {
      font-size: 0.9rem;
      text-align: center;
      color: #5f7163;
      margin-bottom: 1.2rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    label {
      font-size: 0.86rem;
      font-weight: 600;
      color: #073b4c;
    }
    input, select {
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.55rem 0.7rem;
      border-radius: 999px;
      border: 1px solid #d3c6af;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #007f63;
      box-shadow: 0 0 0 1px rgba(0, 127, 99, 0.35);
    }
    .forgot {
      font-size: 0.8rem;
      text-align: right;
      margin-top: -0.25rem;
      margin-bottom: 0.6rem;
    }
    .forgot a {
      color: #007f63;
      text-decoration: none;
    }
    .forgot a:hover {
      text-decoration: underline;
    }
    .btn-primary {
      width: 100%;
      margin-top: 0.1rem;
      padding: 0.65rem 1rem;
      border-radius: 999px;
      border: none;
      background: #00a88e;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.96rem;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #007f63;
    }
    .secondary-link {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 0.7rem;
    }
    .secondary-link a {
      color: #007f63;
      text-decoration: none;
    }
    .secondary-link a:hover {
      text-decoration: underline;
    }
    .back-home {
      text-align: center;
      margin-top: 0.4rem;
      font-size: 0.8rem;
    }
    .back-home a {
      color: #5f7163;
      text-decoration: none;
    }
    .back-home a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <span class="logo-circle">HBL</span>
      <span>HABIB BANK LIMITED</span>
    </div>
    <h1>Log in to internet banking</h1>
    <p class="subtitle">Enter your customer ID and password to access your HABIB BANK LIMITED accounts.</p>
    <form action="index.html" method="get">
      <div>
        <label for="customer-id">Customer ID</label>
        <input id="customer-id" name="customer-id" type="text" required>
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="6">
      </div>
      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary">Log in</button>
    </form>
    <div class="secondary-link">
      New to HABIB BANK LIMITED?
      <a href="signup.html">Register for digital banking</a>
    </div>
    <div class="back-home">
      <a href="index.html">Back to HABIB BANK LIMITED home</a>
    </div>
  </div>
</body>
</html>
